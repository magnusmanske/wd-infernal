<html>

<head>
	<meta name="ROBOTS" content="NOINDEX, NOFOLLOW" />
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="favicon.png" type="image/png" />
	<link rel="stylesheet"
		href="https://tools-static.wmflabs.org/cdnjs/ajax/libs/twitter-bootstrap/4.0.0/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://tools-static.wmflabs.org/magnustools/resources/html/wikimedia.css" />
	<script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script
		src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/twitter-bootstrap/4.0.0/js/bootstrap.bundle.min.js"></script>

	<script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/vue/2.5.13/vue.min.js"></script>
	<script src="https://tools-static.wmflabs.org/cdnjs/ajax/libs/vue-router/3.0.1/vue-router.min.js"></script>
	<script src="https://tools-static.wmflabs.org/magnustools/resources/js/wikidata.js"></script>
	<script src="https://tools-static.wmflabs.org/magnustools/resources/vue/shared.js"></script>
	<title>Result</title>
	<style>
		.results-dimmed {
			opacity: 0.25;
			pointer-events: none;
			transition: opacity 0.3s ease;
		}

		.results-ready {
			opacity: 1;
			transition: opacity 0.3s ease;
		}

		#loading-indicator {
			display: none;
			text-align: center;
			padding: 1.5rem 0;
			color: #555;
			font-size: 0.95rem;
		}

		#loading-indicator.active {
			display: block;
		}

		.loading-spinner {
			display: inline-block;
			width: 1.4rem;
			height: 1.4rem;
			border: 3px solid #dee2e6;
			border-top-color: #007bff;
			border-radius: 50%;
			animation: result-spin 0.7s linear infinite;
			vertical-align: middle;
			margin-right: 0.5rem;
		}

		@keyframes result-spin {
			to {
				transform: rotate(360deg);
			}
		}
	</style>
</head>

<body>
	<div class="container">%%RESULT%%</div>
</body>
<script>
	var wd = new WikiData();

	/* ── build & insert the loading indicator between form and results ── */
	var $resultsRow = $(".container .row").first();
	var $loadingIndicator = $(
		'<div id="loading-indicator">' +
		'<span class="loading-spinner"></span>' +
		'<span>Loading details\u2026</span>' +
		"</div>"
	);
	$resultsRow.before($loadingIndicator);

	function showLoading() {
		$resultsRow.removeClass("results-ready").addClass("results-dimmed");
		$loadingIndicator.addClass("active");
	}

	function hideLoading() {
		$resultsRow.removeClass("results-dimmed").addClass("results-ready");
		$loadingIndicator.removeClass("active");
	}

	/* ── date formatting helper ── */
	function formatWdDate(item, prop) {
		var claims = item.getClaimsForProperty(prop);
		if (claims.length === 0) return "";
		var best = item.bestRank(claims);
		if (best.length === 0) return "";
		var dateVal = item.getClaimDate(best[0]);
		if (!dateVal) return "";
		var m = dateVal.time.match(/^([+-]?\d+)-(\d{2})-(\d{2})/);
		if (!m) return dateVal.time;
		var year = parseInt(m[1]);
		var month = parseInt(m[2]);
		var day = parseInt(m[3]);
		var precision = dateVal.precision || 11;
		if (precision <= 9) return "" + year;
		if (precision === 10)
			return year + "-" + String(month).padStart(2, "0");
		return (
			year +
			"-" +
			String(month).padStart(2, "0") +
			"-" +
			String(day).padStart(2, "0")
		);
	}

	/* ── fetch labels, descriptions & dates, then reveal ── */
	function updateResultLabels() {
		var qs = [];
		$("a[q]").each(function (index, element) {
			qs.push(element.getAttribute("q"));
		});

		if (qs.length === 0) {
			hideLoading();
			return;
		}

		showLoading();

		wd.getItemBatch(qs, function () {
			qs.forEach(function (q) {
				var key = "a[q='" + q + "']";
				$(key)
					.attr("href", "https://www.wikidata.org/wiki/" + q)
					.attr("target", "_blank");
				var i = wd.getItem(q);
				if (i === undefined) return;

				$(key).text(i.getLabel("en"));
				$(".desc[data-q='" + q + "']").text(i.getDesc("en"));
				$(".birth[data-q='" + q + "']").text(formatWdDate(i, "P569"));
				$(".death[data-q='" + q + "']").text(formatWdDate(i, "P570"));
			});

			hideLoading();
		});
	}

	/* ── capitalise first letter of every word / initial ── */
	function fixUpName(name) {
		return name.replace(/(?:^|\s|\.)\S/g, function (m) {
			return m.toUpperCase();
		});
	}

	/* ── dim old results when the user submits a new search ── */
	var searchForm = document.getElementById("search-form");
	if (searchForm) {
		searchForm.addEventListener("submit", function (e) {
			e.preventDefault();
			var input = document.getElementById("search-input");
			var n = fixUpName(input.value.trim());
			input.value = n;
			if (!n) return;
			showLoading();
			window.location.href =
				"/initial_search/" + encodeURIComponent(n) + "?format=html";
		});
	}

	updateResultLabels();
</script>

</html>
